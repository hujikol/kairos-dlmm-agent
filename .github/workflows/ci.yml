name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: .

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high 2>&1 | grep -v "bigint-buffer" || true

      - name: Lint
        run: npm run lint

      - name: Run automated tests
        run: npm test
        env:
          WALLET_PRIVATE_KEY: "[]"
          RPC_URL: "https://api.mainnet-beta.solana.com"
          OPENROUTER_API_KEY: "test-key"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: .

      - name: Install dependencies
        run: npm ci

      - name: Find integration test files
        id: find-integration-tests
        run: |
          # Find test files in test/ subdir that do NOT match *.test.js pattern
          # Also include any file with "integration" in its name
          INTEGRATION_TESTS=$(node -e "
            const fs = require('fs');
            const path = require('path');
            const testDir = 'test';
            const files = fs.readdirSync(testDir)
              .filter(f => f.endsWith('.js'))
              .filter(f => !f.match(/^test-.*\.js$/) && !f.match(/^.*\.test\.js$/))  // not test-*.js or *.test.js
              .map(f => path.join(testDir, f));
            console.log(files.join(' '));
          " || echo "")
          echo "tests=$INTEGRATION_TESTS" >> $GITHUB_OUTPUT

      - name: Run integration tests
        run: |
          if [ -n "${{ steps.find-integration-tests.outputs.tests }}" ]; then
            node --test ${{ steps.find-integration-tests.outputs.tests }}
          else
            echo "No integration tests found"
          fi
        env:
          WALLET_PRIVATE_KEY: "[]"
          RPC_URL: "https://api.mainnet-beta.solana.com"
          OPENROUTER_API_KEY: "test-key"

  build:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check core files parse
        run: |
          node --check src/index.js
          node --check src/agent/index.js
          node --check src/core/db.js
          node --check src/core/logger.js
          node --check src/core/scheduler.js
          node --check src/integrations/meteora.js
          node --check src/integrations/helius.js
          node --check src/core/postmortem.js
          node --check src/core/simulator.js
