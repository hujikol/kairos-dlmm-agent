name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Lint
        run: npm run lint

      - name: Run automated tests
        run: npm test
        env:
          WALLET_PRIVATE_KEY: "[]"
          RPC_URL: "https://api.mainnet-beta.solana.com"
          OPENROUTER_API_KEY: "test-key"

  build:
    name: Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check core files parse
        run: |
          node --check src/index.js
          node --check src/agent/index.js
          node --check src/core/db.js
          node --check src/core/logger.js
          node --check src/core/scheduler.js
          node --check src/integrations/meteora.js
          node --check src/integrations/helius.js
          node --check src/core/postmortem.js
          node --check src/core/simulator.js
